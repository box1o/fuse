environment = "development"
debug = true
version = "1.0.0"



[server]
host = "localhost"
port = 3000

[server.tls]
enabled = false

[frontend]
url = "http://localhost:5173"

[database]
host = "localhost"
port = 5432
user = "postgres"
password = ""
name = "fintaxy"
sslmode = "disable"
migrate = true 

[redis]
host = "localhost"
port = 6379
username = ""
password = ""
db = 0

[cors]
enabled = true
allowed_origins = ["http://localhost:5173"]
allowed_methods = ["GET", "POST", "PUT", "DELETE", "OPTIONS", "PATCH"]
allowed_headers = ["Content-Type", "X-Requested-With", "Accept", "Authorization"]
exposed_headers = ["X-Total-Count"]
allow_credentials = true
max_age = 86400

[auth]
session_secret = ""

[auth.google]
client_id = ""
client_secret = ""

[session]
duration = 86400
name = "fintaxy_session"

[session.cookie]
path = "/"
domain = ""
secure = false
http_only = true
same_site = "lax"



[mail]
from = "alexei"
password = "1234"
name = "Alexei"

[compute.price]
