services:
  # Frontend service
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
        VITE_NODE_ENV: production
        VITE_APPLICATION_NAME: ${VITE_APPLICATION_NAME:-Fuse}
        VITE_API_TIMEOUT: ${VITE_API_TIMEOUT:-30000}

    restart: unless-stopped

    ports:
      - "${FRONTEND_PORT:-5173}:80"

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://127.0.0.1/health"
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Backend service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped

    ports:
      - "${BACKEND_PORT:-3000}:3000"

    environment:
      ENVIRONMENT: development

      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 3000

      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_USER: ${DATABASE_USER:-fuse}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
      DATABASE_NAME: ${DATABASE_NAME:-fuse}
      DATABASE_SSLMODE: ${DATABASE_SSLMODE:-require}
      DATABASE_MIGRATE: ${DATABASE_MIGRATE:-true}

      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6380}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB:-0}

      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}

      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET:-replace-this-development-secret}
      AUTH_GOOGLE_CLIENT_ID: ${AUTH_GOOGLE_CLIENT_ID:-development-client-id}
      AUTH_GOOGLE_CLIENT_SECRET: ${AUTH_GOOGLE_CLIENT_SECRET:-development-client-secret}

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3000/health"
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
